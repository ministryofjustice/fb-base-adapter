version: 2.1
orbs:
  slack: circleci/slack@3.4.2
  aws-cli: circleci/aws-cli@4.0.0 # use v4 of this orb
  browser-tools: circleci/browser-tools@1.4.8

jobs:
  login-to-aws:
    docker: &docker_image
      - image: 'cimg/ruby:3.4-node'
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: $ECR_ROLE_TO_ASSUME # this will use the env var
          region: $ECR_REGION # this will use the env var
      - run: &ecr_login
          name: Login to ecr
          command: |
            aws ecr get-login-password --region $ECR_REGION | docker login --username AWS --password-stdin ${AWS_ECR_REGISTRY_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com
            aws configure export-credentials --format env
      - run: |
          cp $BASH_ENV bash.env
      - persist_to_workspace:
          root: .
          paths:
            - bash.env
  tests:
    working_directory: ~/circle
    docker:
      - image: cimg/ruby:3.4
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: build
          command: make build
      - run:
          name: test
          command: make test
      - slack/status: &slack_status
          fail_only: true
          only_for_branches: main
          failure_message: ":facepalm:  Failed job $CIRCLE_JOB  :homer-disappear:"
          include_job_number_field: false
  build_and_deploy_to_test:
    working_directory: ~/circle/git/fb-base-adapter
    docker: &ecr_image
      - image: docker.io/ministryofjustice/fb-builder:latest
        auth:
          username: $DOCKER_LOGIN
          password: $DOCKER_PASSWORD
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: .
      - run: &workspace_envs
          command: |
            cat bash.env >> $BASH_ENV
      - add_ssh_keys:
          fingerprints:
            - "de:bd:00:dd:33:2c:22:2c:70:9c:e0:e1:2b:92:a5:0e"
      - run:
          name: Add GitHub to known hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Setup base environment variable
          command: |
            echo "export BUILD_SHA=$CIRCLE_SHA1" >> $BASH_ENV
            echo "export SSH_FILE_FOR_SECRETS=~/.ssh/id_rsa_debd00dd332c222c709ce0e12b92a50e" >> $BASH_ENV
      - run: &deploy_scripts
          name: cloning deploy scripts
          command: 'git clone git@github.com:ministryofjustice/fb-deploy.git deploy-scripts'
      - run:
          name: build and push docker images
          environment:
            ENVIRONMENT_NAME: test
          command: './deploy-scripts/bin/build'
      - run:
          name: deploy to test environment in new cluster
          environment:
            APPLICATION_NAME: fb-base-adapter
            PLATFORM_ENV: test
            K8S_NAMESPACE: formbuilder-base-adapter-test
          command: './deploy-scripts/bin/deploy-eks'
      - slack/status: *slack_status
  acceptance_tests:
    docker: *docker_image
    resource_class: large
    steps:
      - checkout
      - run: sudo apt-get update
      - setup_remote_docker
      - browser-tools/install-chrome:
          chrome-version: 149.0.7827.200
      - browser-tools/install-chromedriver
      - run:
          name: Check browser tools install
          command: |
            google-chrome --version
            chromedriver --version
      - run: mkdir ~/rspec
      - run:
          name: Run acceptance tests
          environment:
            CI_MODE: 'true'
          command: |
            echo 'Cloning acceptance tests'
            git clone https://github.com/ministryofjustice/fb-acceptance-tests
            cd fb-acceptance-tests/integration
            cp tests.env.ci tests.env

            echo 'Setting up environment variables'

            for var in \
              GOOGLE_CLIENT_ID \
              GOOGLE_CLIENT_SECRET \
              GOOGLE_REFRESH_TOKEN \
              NEW_RUNNER_ACCEPTANCE_TEST_USER \
              NEW_RUNNER_ACCEPTANCE_TEST_PASSWORD \
              MS_LIST_ID \
              MS_SITE_ID \
              MS_OAUTH_URL \
              MS_ADMIN_APP_SECRET \
              MS_ADMIN_APP_ID \
              SMOKE_TEST_USER \
              SMOKE_TEST_PASSWORD
            do
              printf '%s=%q\n' "$var" "${!var}" >> tests.env
            done

            bundle check || bundle install

            circleci tests glob "spec/**/*_spec.rb" | circleci tests run --command="xargs bundle exec rspec --format progress --format RspecJunitFormatter -o ~/rspec/rspec.xml" --verbose --split-by=timings
      - store_test_results:
          path: ~/rspec
      - store_artifacts:
          path: ~/rspec
      - slack/status:
          only_for_branches: main
          success_message: ":rocket:  Successfully deployed to Test  :guitar:"
          failure_message: ":facepalm:  Acceptance tests failed  :homer-disappear:"
          include_job_number_field: false

workflows:
  version: 2
  release:
    jobs:
      - login-to-aws:
          context: &moj-forms-context
            - moj-forms
      - tests:
          requires:
            - login-to-aws
      - build_and_deploy_to_test:
          context: *moj-forms-context
          requires:
            - tests
          filters:
            branches:
              only:
                - main
      - acceptance_tests:
          context: *moj-forms-context
          requires:
            - build_and_deploy_to_test
          filters:
            branches:
              only:
                - main
