version: 2.1
orbs:
  slack: circleci/slack@3.4.2
  aws-cli: circleci/aws-cli@4.0.0 # use v4 of this orb

jobs:
  login-to-aws:
    docker: &docker_image
      - image: 'cimg/ruby:3.2.2-node'
    steps:
      - checkout
      - aws-cli/setup:
          role_arn: $ECR_ROLE_TO_ASSUME # this will use the env var
          region: $ECR_REGION # this will use the env var
      - run: &ecr_login
          name: Login to ecr
          command: |
            aws ecr get-login-password --region $ECR_REGION | docker login --username AWS --password-stdin ${AWS_ECR_REGISTRY_ID}.dkr.ecr.${ECR_REGION}.amazonaws.com
            aws configure export-credentials --format env
      - run: |
          cp $BASH_ENV bash.env
      - persist_to_workspace:
          root: .
          paths:
            - bash.env
  tests:
    working_directory: ~/circle
    docker:
      - image: cimg/ruby:3.2.2
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: build
          command: make build
      - run:
          name: test
          command: make test
      - slack/status: &slack_status
          fail_only: true
          only_for_branches: main
          failure_message: ":facepalm:  Failed job $CIRCLE_JOB  :homer-disappear:"
          include_job_number_field: false
  build_and_deploy_to_test:
    working_directory: ~/circle/git/fb-base-adapter
    docker: &ecr_image
      - image: docker.io/ministryofjustice/fb-builder:latest
        auth:
          username: $DOCKER_LOGIN
          password: $DOCKER_PASSWORD
    steps:
      - checkout
      - setup_remote_docker
      - attach_workspace:
          at: .
      - run: &workspace_envs
          command: |
            cat bash.env >> $BASH_ENV
      - add_ssh_keys:
          fingerprints:
            - 62:af:a5:bf:2e:59:bd:c6:9d:57:a3:f8:1a:3d:58:5f
            - SHA256:Yhf9HKLO66z8POxG+PChnlML8vCjPcGSC7j4tsgHHnc
#            - "42:56:f6:e8:5f:50:55:35:80:68:4b:72:25:e7:92:f2"
#            - "SHA256:9S5LX7K6buk+PfqA9tqDaEFvj5n6NoXBCbkdLkNHhC8"
#            - "e7:be:28:e7:73:52:0e:eb:db:53:75:d2:09:9d:5e:d6"
#            - "SHA256:5ZEJmn3tsV/K6GS6qXwJ/j/VRbryNTbWeMTU8C4lFx8"
#            - "SHA256:iL30CyvjfNHw5rhRBewqugj9H+Kf9qBp/WGqQ+J/Dao"
#            - "SHA256:ff1T9KvmlPkN6sycmgoNhixBExDXC6HNzez8y40UQ/0"
#            - "df:d0:db:5c:80:f6:29:7d:71:c2:cf:96:51:94:aa:82"
#            - "e2:85:66:4e:37:98:32:e2:1b:47:7d:55:76:2b:08:2b"
#            - "74:6c:a0:0a:2e:2d:40:1c:14:83:fc:2f:bf:46:cb:b6"
#            - "SHA256:3SMEWbx0WkZ7O5YcSKys3Gl1CdT5b+NBVWR8GhpO4Qc"
#            - "SHA256:6MqDy4XS6Mexn0IMbHnbJPRX+DHI+D0RBK/iw2FZ7u0"
      - run:
          name: List files in folder
          command: |
            ls -la ~/.ssh
      - run:
          name: Setup base environment variable
          command: |
            echo "export BUILD_SHA=$CIRCLE_SHA1" >> $BASH_ENV
            echo "export SSH_FILE_FOR_SECRETS=~/.ssh/id_rsa_62afa5bf2e59bdc69d57a3f81a3d585f" >> $BASH_ENV
      - run: &deploy_scripts
          name: cloning deploy scripts
          command: 'git clone git@github.com:ministryofjustice/fb-deploy.git deploy-scripts'
      - run:
          name: build and push docker images
          environment:
            ENVIRONMENT_NAME: test
          command: './deploy-scripts/bin/build'
      - run:
          name: deploy to test environment in new cluster
          environment:
            APPLICATION_NAME: fb-base-adapter
            PLATFORM_ENV: test
            K8S_NAMESPACE: formbuilder-base-adapter-test
          command: './deploy-scripts/bin/deploy-eks'
      - slack/status: *slack_status
  acceptance_tests:
    docker: *ecr_image
    resource_class: large
    steps:
      - checkout
      - setup_remote_docker
      - run: *deploy_scripts
      - run:
          name: Run acceptance tests
          command: './deploy-scripts/bin/acceptance_tests'
      - slack/status:
          only_for_branches: main
          success_message: ":rocket:  Successfully deployed to Test  :guitar:"
          failure_message: ":facepalm:  Acceptance tests failed  :homer-disappear:"
          include_job_number_field: false

workflows:
  version: 2
  release:
    jobs:
      - login-to-aws:
          context: &moj-forms-context
            - moj-forms
      - tests:
          requires:
            - login-to-aws
      - build_and_deploy_to_test:
          context: *moj-forms-context
          requires:
            - tests
      - acceptance_tests:
          context: *moj-forms-context
          requires:
            - build_and_deploy_to_test
          filters:
            branches:
              only:
                - main